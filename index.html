<!DOCTYPE html>
<html>
<head>
  <title>My Script Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background-color: #1E90FF; /* blue background */
      color: white;
      font-family: sans-serif;
      text-align: center;
      padding: 50px 20px; /* some padding for mobile */
    }

    h1 {
      font-size: 2em;
      margin-bottom: 40px;
    }

    button {
      padding: 20px 60px;       /* big button area for mobile tap */
      font-size: 22px;          /* readable on small screens */
      background-color: #FFD700; /* yellow button */
      border: none;
      border-radius: 12px;
      cursor: pointer;
      width: 80%;               /* makes button stretch on small screens */
      max-width: 400px;         /* limits button size on desktop */
    }

    button:hover {
      background-color: #FFC300;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.5em;       /* smaller heading on tiny screens */
      }
      button {
        padding: 18px 40px;     /* slightly smaller on tiny phones */
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

<h1>❄️ ICY SCRIPTS FREEZE TRADE COPY BUTTON 🧊</h1>

<button onclick="copyScript()">Copy Script</button>

<script>
function copyScript() {
  navigator.clipboard.writeText('loadstring(game:HttpGet("https://pastebin.com/raw/nzG1Hx0B"))()');
  alert("Copied!");
}
</script>

</body>
</html>
